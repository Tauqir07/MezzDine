<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">


<g transform="translate(130, 25)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

  <!-- Stylized M: left arch = roof, right arch = plate -->
